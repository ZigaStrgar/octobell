name: 🐛 Bug Report
description: Report something that isn't working as expected.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and this bug has not been reported before.
          required: true
        - label: I am running the latest version of OctoBell.
          required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "Example: The menu bar icon never stops spinning even after all runs complete."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger this bug.
      placeholder: |
        1. Open OctoBell from the menu bar
        2. Wait for the first poll cycle to complete
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OctoBell version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: macos
    attributes:
      label: macOS version
      options:
        - macOS 14 (Sonoma)
        - macOS 15 (Sequoia)
        - Other (please specify in additional context)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or console output
      description: Paste any relevant output from Xcode's console or the macOS Console app. This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or any other information that might help.
