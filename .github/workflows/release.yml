name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, Sign, Notarize & Release
    runs-on: macos-15

    env:
      APP_NAME: OctoBell
      SCHEME: OctoBell
      BUNDLE_ID: com.zigastrgar.octobell
      XCODE_PROJECT: OctoBell.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen

      - name: Parse version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(uuidgen)

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign

          # Make the keychain the default and allow codesign access
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build archive
        run: |
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -destination "generic/platform=macOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Export app
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="$RUNNER_TEMP/export/$APP_NAME.app"

          # Zip for notarization submission
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/$APP_NAME-notarize.zip"

          xcrun notarytool submit "$RUNNER_TEMP/$APP_NAME-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket to the app
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP_PATH="$RUNNER_TEMP/export/$APP_NAME.app"
          DMG_NAME="${APP_NAME}-${VERSION}.dmg"
          DMG_PATH="$RUNNER_TEMP/$DMG_NAME"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Compute SHA256
        run: |
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "DMG_SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "SHA256 of DMG: $SHA256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OctoBell ${{ steps.version.outputs.VERSION }}"
          body: |
            ## OctoBell ${{ steps.version.outputs.VERSION }}

            ### Installation

            ```bash
            brew tap zigastrgar/octobell
            brew install --cask octobell
            ```

            Or [download the DMG directly](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.DMG_NAME }}) and drag **OctoBell.app** to your Applications folder.

            ---

            **SHA-256:** `${{ env.DMG_SHA256 }}`
          draft: false
          prerelease: false
          files: ${{ env.DMG_PATH }}

      - name: Update Homebrew cask in this repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256="$DMG_SHA256"

          # Update the version and SHA256 directly in the checked-out repo
          CASK_FILE="Casks/octobell.rb"
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" "$CASK_FILE"
          sed -i '' "s/sha256 .*/sha256 \"${SHA256}\"/" "$CASK_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git commit -m "chore: bump cask to ${VERSION} [skip ci]"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
